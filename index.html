<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SRJ Countdown</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>
  <div id="bg" class="bg"></div>
  <div id="storyOverlay" class="story-overlay"></div>
  <div class="bg-overlay"></div>


<div class="container">

  <h1>Moyo 🍂 Mrembo</h1>
  <div class="sub">SRJ Count Down and Flight Tracker</div>

  <!-- COUNTDOWN -->
  <div class="countdown" id="countdown">Loading countdown...</div>
  <div class="rotate-hint">
    📱 Rotate your phone for a better experience
  </div>

  <!-- FLAGS -->
  <div class="flags">
    <div>🇬🇧</div>
    <div>🇰🇪</div>
  </div>

  <!-- PROGRESS -->
  <div class="bar">
    <div class="glow" id="glow"></div>
    <div class="dot" id="dot"></div>
  </div>

  <div>
    <!-- TIMELINE -->
    <div class="timeline" id="timeline"></div>
  </div>
  
  <div>
    <!-- FLIGHT EMBED (placeholder) -->
    <div class="embed" id="flightEmbed">
      Loading flight radar...
    </div>
  </div>
  
</div>


<script src="script.js"></script>
<div class="toast" id="toast"></div>

</body>
</html>
